<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout OS v30.3 - Fixed All</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; touch-action: manipulation; }
        .nav { display: flex; justify-content: space-around; background: var(--card); padding: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        .nav button { background: none; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.7rem; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 140px; }
        .view { display: none; } .view.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; }
        .time-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .time-input { background: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 0.8rem; }
        .selector-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; }
        .sel-btn { flex: 0 0 auto; padding: 12px 20px; border-radius: 20px; border: 2px solid var(--primary); background: #1e293b; color: white; font-weight: bold; font-size: 0.75rem; }
        .sel-btn.active { background: var(--primary); }
        .inline-timer { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .timer-val { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .t-controls button { background: #334155; border: none; color: white; padding: 5px 10px; border-radius: 4px; margin-left: 5px; font-size: 0.7rem; }
        .set-input { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #475569; background: #0f172a; color: white; text-align: center; font-weight: bold; margin: 4px; outline: none; }
        .set-input.has-value { border-color: var(--accent); background: #064e3b; }
        .edit-input { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; margin: 5px 0; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav">
    <button onclick="showView('today')" id="nav-today" class="active">TREINAR</button>
    <button onclick="showView('cardio')" id="nav-cardio">CARDIO</button>
    <button onclick="showView('edit')" id="nav-edit">CONFIGS</button>
</div>

<div class="container">
    <div id="view-today" class="view active">
        <div class="card">
            <div class="time-box">
                <div><label style="font-size: 0.6rem; color: #94a3b8;">START</label><input type="datetime-local" id="startTime" class="time-input"></div>
                <div><label style="font-size: 0.6rem; color: #94a3b8;">END</label><input type="datetime-local" id="endTime" class="time-input"></div>
            </div>
        </div>
        <div id="workout-selector" class="selector-scroll"></div>
        <div id="todayList"></div>
        <button id="finish-btn" class="btn-action" style="display:none" onclick="finishWorkout()">FINALIZAR SESSÃO</button>
    </div>

    <div id="view-cardio" class="view">
        <div class="card">
            <h3>LOG CARDIO</h3>
            <input type="text" id="c-type" class="edit-input" placeholder="Atividade (Corrida, Corda...)">
            <input type="text" id="c-dist" class="edit-input" placeholder="Distância/Intensidade">
            <input type="text" id="c-time" class="edit-input" placeholder="Tempo Total">
            <button class="btn-action" onclick="finishCardio()">ENVIAR CARDIO</button>
        </div>
    </div>
    
    <div id="view-edit" class="view">
        <button class="btn-action" style="background:var(--primary)" onclick="addNewCategory()">+ NOVO TREINO</button>
        <div id="edit-lists"></div>
        <button class="btn-action" onclick="saveAll()">SALVAR TUDO</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxZeBRHstb1ZEsnPHGqyY5BUqkB1s_FXjQoIYsCHpqKcKBM4UPGOHvqEXGoi4Ul33hy/exec"; 
    let activeT = null;
    let timerInterval;

    let state = JSON.parse(localStorage.getItem('workoutV30')) || { 
        routines: { "Exemplo": [{n:"Supino", s:3, r:"12", d:60}] }, 
        currentSession: {} 
    };

    window.onload = () => {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        const local = (new Date(now - offset)).toISOString().slice(0, 16);
        document.getElementById('startTime').value = local;
        document.getElementById('endTime').value = local;
        renderSelector();
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.getElementById('nav-' + v).classList.add('active');
        if (v === 'edit') renderEdit();
    }

    function renderSelector() {
        const grid = document.getElementById('workout-selector');
        grid.innerHTML = Object.keys(state.routines).map(key => 
            `<button class="sel-btn ${activeT === key ? 'active' : ''}" onclick="selectWorkout('${key}')">${key.toUpperCase()}</button>`
        ).join('');
    }

    function selectWorkout(key) {
        activeT = key;
        if (!state.currentSession[activeT]) state.currentSession[activeT] = {};
        renderSelector();
        renderToday();
        document.getElementById('finish-btn').style.display = 'block';
    }

    function renderToday() {
        if(!activeT) return;
        const container = document.getElementById('todayList');
        container.innerHTML = state.routines[activeT].map((ex, idx) => {
            const exKey = `${activeT}_${idx}`;
            if (!state.currentSession[activeT][exKey]) state.currentSession[activeT][exKey] = Array(parseInt(ex.s)).fill("");
            return `<div class="card">
                <div class="inline-timer">
                    <span id="timer-${exKey}" class="timer-val">00:00</span>
                    <div class="t-controls">
                        <button onclick="startTimer('${exKey}', ${ex.d || 60})">REST</button>
                        <button style="background:#ef4444" onclick="stopTimer('${exKey}')">X</button>
                    </div>
                </div>
                <strong>${ex.n}</strong>
                <div style="display:flex; flex-wrap:wrap; margin-top:10px;">
                    ${state.currentSession[activeT][exKey].map((val, i) => `
                        <input type="number" class="set-input ${val !== "" ? 'has-value' : ''}" 
                               value="${val}" placeholder="${i+1}"
                               onchange="recordSet('${exKey}', ${i}, this.value)">
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function startTimer(id, seconds) {
        stopTimer(id);
        let t = seconds;
        const el = document.getElementById('timer-'+id);
        timerInterval = setInterval(() => {
            t--;
            const m = Math.floor(t/60); const s = t%60;
            el.innerText = `${m}:${s<10?'0':''}${s}`;
            if(t<=0) { clearInterval(timerInterval); navigator.vibrate(500); el.innerText="DONE"; }
        }, 1000);
    }
    function stopTimer(id) { clearInterval(timerInterval); if(document.getElementById('timer-'+id)) document.getElementById('timer-'+id).innerText="00:00"; }

    function recordSet(exKey, setIdx, val) {
        state.currentSession[activeT][exKey][setIdx] = val;
        localStorage.setItem('workoutV30', JSON.stringify(state));
        renderToday();
    }

    async function finishWorkout() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('endTime').value = (new Date(now - offset)).toISOString().slice(0, 16);
        const details = [];
        state.routines[activeT].forEach((ex, idx) => {
            const exKey = `${activeT}_${idx}`;
            const sets = (state.currentSession[activeT][exKey] || []).filter(v => v !== "");
            if (sets.length > 0) details.push({ name: ex.n, setsDone: sets.length, reps: sets.join("-") });
        });
        const payload = {
            date: new Date().toLocaleString('pt-BR'),
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            type: "TREINO ("+activeT+")",
            details: details
        };
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        state.currentSession[activeT] = {};
        localStorage.setItem('workoutV30', JSON.stringify(state));
        location.reload();
    }

    async function finishCardio() {
        const payload = {
            date: new Date().toLocaleString('pt-BR'),
            startTime: document.getElementById('startTime').value,
            endTime: new Date().toISOString(),
            type: "CARDIO",
            dist: document.getElementById('c-type').value + " - " + document.getElementById('c-dist').value,
            time: document.getElementById('c-time').value
        };
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        location.reload();
    }

    function addNewCategory() {
        const n = prompt("Nome do treino:");
        if(n) { state.routines[n] = [{n:"Novo", s:3, r:"12", d:60}]; renderEdit(); }
    }
    function addEx(cat) { state.routines[cat].push({n:"Novo", s:3, r:"12", d:60}); renderEdit(); }
    function removeEx(cat, i) { state.routines[cat].splice(i, 1); renderEdit(); }

    function renderEdit() {
        let h = '';
        for (let t in state.routines) {
            h += `<div class="card"><strong>${t}</strong>`;
            state.routines[t].forEach((ex, i) => {
                h += `<div style="margin-top:10px; border-top:1px solid #334155; padding-top:10px; position:relative;">
                    <button style="position:absolute; right:0; top:10px; background:red; color:white; border:none; border-radius:4px; font-size:0.6rem;" onclick="removeEx('${t}', ${i})">X</button>
                    <input type="text" value="${ex.n}" onchange="state.routines['${t}'][${i}].n=this.value" class="edit-input">
                    <div style="display:flex; gap:5px;">
                        <input type="number" value="${ex.s}" onchange="state.routines['${t}'][${i}].s=this.value" class="edit-input" placeholder="Sets">
                        <input type="number" value="${ex.d}" onchange="state.routines['${t}'][${i}].d=this.value" class="edit-input" placeholder="Rest (s)">
                    </div>
                </div>`;
            });
            h += `<button class="sel-btn" style="width:100%; margin-top:10px; border-style:dashed;" onclick="addEx('${t}')">+ Exercício</button></div>`;
        }
        document.getElementById('edit-lists').innerHTML = h;
    }
    function saveAll() { localStorage.setItem('workoutV30', JSON.stringify(state)); alert("Configurações Salvas!"); location.reload(); }
</script>
</body>
</html>
