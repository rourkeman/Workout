<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout OS v30 - Full Edition</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; touch-action: manipulation; }
        .nav { display: flex; justify-content: space-around; background: var(--card); padding: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        .nav button { background: none; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 140px; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; }
        
        .time-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .time-box label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .time-input { background: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; width: 100%; font-size: 0.8rem; box-sizing: border-box; }

        .selector-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .selector-scroll::-webkit-scrollbar { display: none; }
        .sel-btn { flex: 0 0 auto; padding: 12px 20px; border-radius: 20px; border: 2px solid var(--primary); background: #1e293b; color: white; cursor: pointer; font-weight: bold; font-size: 0.75rem; white-space: nowrap; }
        .sel-btn.active { background: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .set-input { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #475569; background: #0f172a; color: white; text-align: center; font-weight: bold; font-size: 1rem; margin: 4px; outline: none; }
        .set-input.has-value { border-color: var(--accent); background: #064e3b; }
        
        .edit-input { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; margin: 5px 0; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .danger-btn { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <button onclick="showView('today')" id="nav-today" class="active">TREINAR</button>
    <button onclick="showView('cardio')" id="nav-cardio">CARDIO</button>
    <button onclick="showView('edit')" id="nav-edit">CONFIGS</button>
</div>

<div class="container">
    <div id="view-today" class="view active">
        <div class="card">
            <div class="time-box">
                <div><label>Start Time</label><input type="datetime-local" id="startTime" class="time-input"></div>
                <div><label>End Time</label><input type="datetime-local" id="endTime" class="time-input"></div>
            </div>
        </div>
        <div id="workout-selector" class="selector-scroll"></div>
        <div id="todayList"></div>
        <button id="finish-btn" class="btn-action" style="display:none" onclick="finishWorkout()">FINALIZAR SESSÃO</button>
    </div>

    <div id="view-cardio" class="view">
        <div class="card">
            <h3>CARDIO SESSION</h3>
            <input type="text" id="c-type" class="edit-input" placeholder="Type (Run, Bike, etc.)">
            <input type="text" id="c-dist" class="edit-input" placeholder="Distance/Info">
            <input type="text" id="c-time" class="edit-input" placeholder="Duration (e.g. 30min)">
            <button class="btn-action" onclick="finishCardio()">LOG CARDIO</button>
        </div>
    </div>
    
    <div id="view-edit" class="view">
        <button class="btn-action" style="background:var(--primary)" onclick="addNewCategory()">+ NOVO TREINO</button>
        <div id="edit-lists"></div>
        <button class="btn-action" onclick="saveAll()">SALVAR ALTERAÇÕES</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxZeBRHstb1ZEsnPHGqyY5BUqkB1s_FXjQoIYsCHpqKcKBM4UPGOHvqEXGoi4Ul33hy/exec"; 
    let activeT = null;

    let state = JSON.parse(localStorage.getItem('workoutV30')) || { 
        routines: { "Exemplo": [{n:"Supino", s:3, r:"12", d:60}] }, 
        currentSession: {} 
    };

    window.onload = () => {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        const localTime = (new Date(now - offset)).toISOString().slice(0, 16);
        document.getElementById('startTime').value = localTime;
        document.getElementById('endTime').value = localTime;
        renderSelector();
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
        if(v === 'edit') renderEdit();
    }

    function renderSelector() {
        const grid = document.getElementById('workout-selector');
        grid.innerHTML = Object.keys(state.routines).map(key => 
            `<button class="sel-btn ${activeT === key ? 'active' : ''}" onclick="selectWorkout('${key}')">${key.toUpperCase()}</button>`
        ).join('');
    }

    function selectWorkout(key) {
        activeT = key;
        if (!state.currentSession[activeT]) state.currentSession[activeT] = {};
        renderSelector();
        renderToday();
        document.getElementById('finish-btn').style.display = 'block';
    }

    function renderToday() {
        if(!activeT) return;
        const container = document.getElementById('todayList');
        container.innerHTML = state.routines[activeT].map((ex, idx) => {
            const exKey = `${activeT}_${idx}`;
            if (!state.currentSession[activeT][exKey]) state.currentSession[activeT][exKey] = Array(parseInt(ex.s)).fill("");
            return `<div class="card">
                <strong>${ex.n}</strong>
                <div style="display:flex; flex-wrap:wrap; margin-top:10px;">
                    ${state.currentSession[activeT][exKey].map((val, i) => `
                        <input type="number" class="set-input ${val !== "" ? 'has-value' : ''}" 
                               value="${val}" placeholder="${i+1}"
                               onchange="recordSet('${exKey}', ${i}, this.value)">
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function recordSet(exKey, setIdx, val) {
        state.currentSession[activeT][exKey][setIdx] = val;
        localStorage.setItem('workoutV30', JSON.stringify(state));
        renderToday();
    }

    async function finishWorkout() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('endTime').value = (new Date(now - offset)).toISOString().slice(0, 16);

        const details = [];
        state.routines[activeT].forEach((ex, idx) => {
            const exKey = `${activeT}_${idx}`;
            const sets = (state.currentSession[activeT][exKey] || []).filter(v => v !== "");
            if (sets.length > 0) details.push({ name: ex.n, setsDone: sets.length, reps: sets.join("-") });
        });

        const payload = {
            date: new Date().toLocaleString('pt-BR'),
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            type: "TREINO ("+activeT+")",
            details: details
        };

        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Enviado com Biometria!");
        state.currentSession[activeT] = {};
        localStorage.setItem('workoutV30', JSON.stringify(state));
        location.reload();
    }

    async function finishCardio() {
        const payload = {
            date: new Date().toLocaleString('pt-BR'),
            startTime: document.getElementById('startTime').value, // Uses the same start time
            endTime: new Date().toISOString(),
            type: "CARDIO: " + document.getElementById('c-type').value,
            dist: document.getElementById('c-dist').value,
            time: document.getElementById('c-time').value
        };
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Cardio Enviado!");
        location.reload();
    }

    // --- CONFIGS FIX ---
    function addNewCategory() {
        const name = prompt("Nome do treino:");
        if(name) { state.routines[name] = [{n:"Novo", s:3, r:"10", d:60}]; renderEdit(); }
    }

    function removeCategory(name) {
        if(confirm("Excluir '"+name+"'?")) { delete state.routines[name]; renderEdit(); }
    }

    function addEx(cat) {
        state.routines[cat].push({n:"Novo Exercício", s:3, r:"12", d:60});
        renderEdit();
    }

    function renderEdit() {
        let h = '';
        for (let t in state.routines) {
            h += `<div class="card" style="border-left: 4px solid var(--primary)">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0">${t}</h3>
                    <button class="danger-btn" onclick="removeCategory('${t}')">EXCLUIR</button>
                </div>`;
            state.routines[t].forEach((ex, i) => {
                h += `<div style="margin-top:10px; border-top:1px solid #334155; padding-top:10px;">
                    <input type="text" value="${ex.n}" onchange="state.routines['${t}'][${i}].n=this.value" class="edit-input" placeholder="Nome">
                    <div style="display:flex; gap:5px;">
                        <input type="number" value="${ex.s}" onchange="state.routines['${t}'][${i}].s=parseInt(this.value)" class="edit-input" placeholder="Sets">
                        <input type="text" value="${ex.r}" onchange="state.routines['${t}'][${i}].r=this.value" class="edit-input" placeholder="Reps">
                    </div>
                </div>`;
            });
            h += `<button class="sel-btn" style="margin-top:10px; width:100%; border-style:dashed;" onclick="addEx('${t}')">+ Adicionar Exercício</button></div>`;
        }
        document.getElementById('edit-lists').innerHTML = h;
    }

    function saveAll() { localStorage.setItem('workoutV30', JSON.stringify(state)); alert("Salvo!"); renderSelector(); showView('today'); }
</script>
</body>
</html>
