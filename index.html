<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout OS v30 - Biometric</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; touch-action: manipulation; }
        .nav { display: flex; justify-content: space-around; background: var(--card); padding: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        .nav button { background: none; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 140px; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; }
        
        /* Time Input Styling */
        .time-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .time-box label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .time-input { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }

        .selector-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .selector-scroll::-webkit-scrollbar { display: none; }
        .sel-btn { flex: 0 0 auto; padding: 12px 20px; border-radius: 20px; border: 2px solid var(--primary); background: #1e293b; color: white; cursor: pointer; font-weight: bold; font-size: 0.75rem; white-space: nowrap; }
        .sel-btn.active { background: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .set-input { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #475569; background: #0f172a; color: white; text-align: center; font-weight: bold; font-size: 1rem; margin: 4px; outline: none; }
        .set-input.has-value { border-color: var(--accent); background: #064e3b; }
        
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav">
    <button onclick="showView('today')" id="nav-today" class="active">TREINAR</button>
    <button onclick="showView('cardio')" id="nav-cardio">CARDIO</button>
    <button onclick="showView('edit')" id="nav-edit">CONFIGS</button>
</div>

<div class="container">
    <div id="view-today" class="view active">
        <div class="card">
            <div class="time-box">
                <div>
                    <label>Início do Treino</label>
                    <input type="datetime-local" id="startTime" class="time-input">
                </div>
                <div>
                    <label>Fim do Treino</label>
                    <input type="datetime-local" id="endTime" class="time-input">
                </div>
            </div>
        </div>

        <div id="workout-selector" class="selector-scroll"></div>
        <div id="todayList"></div>
        <button id="finish-btn" class="btn-action" style="display:none" onclick="finishWorkout()">FINALIZAR SESSÃO</button>
    </div>

    <div id="view-cardio" class="view">
        <div class="card"><h3>CARDIO MODE</h3><button class="btn-action" onclick="alert('Cardio logic ready')">Log Cardio</button></div>
    </div>
    
    <div id="view-edit" class="view">
        <div id="edit-lists"></div>
        <button class="btn-action" onclick="saveAll()">SALVAR CONFIGS</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxZeBRHstb1ZEsnPHGqyY5BUqkB1s_FXjQoIYsCHpqKcKBM4UPGOHvqEXGoi4Ul33hy/exec"; 
    let activeT = null;

    let state = JSON.parse(localStorage.getItem('workoutV30')) || { 
        routines: { "Segunda": [{n:"Exemplo", s:3, r:"12", d:60}] }, 
        currentSession: {} 
    };

    // Initialize times to NOW
    window.onload = () => {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
        document.getElementById('startTime').value = localISOTime;
        document.getElementById('endTime').value = localISOTime;
        renderSelector();
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    function renderSelector() {
        const grid = document.getElementById('workout-selector');
        grid.innerHTML = Object.keys(state.routines).map(key => 
            `<button class="sel-btn ${activeT === key ? 'active' : ''}" onclick="selectWorkout('${key}')">${key.toUpperCase()}</button>`
        ).join('');
    }

    function selectWorkout(key) {
        activeT = key;
        if (!state.currentSession[activeT]) state.currentSession[activeT] = {};
        renderSelector();
        renderToday();
        document.getElementById('finish-btn').style.display = 'block';
    }

    function renderToday() {
        if(!activeT) return;
        const container = document.getElementById('todayList');
        container.innerHTML = state.routines[activeT].map((ex, idx) => {
            const exerciseKey = `${activeT}_${idx}`;
            if (!state.currentSession[activeT][exerciseKey]) {
                state.currentSession[activeT][exerciseKey] = Array(parseInt(ex.s)).fill("");
            }

            return `<div class="card">
                <strong>${ex.n}</strong>
                <div style="display:flex; flex-wrap:wrap; margin-top:10px;">
                    ${state.currentSession[activeT][exerciseKey].map((val, i) => `
                        <input type="number" class="set-input ${val !== "" ? 'has-value' : ''}" 
                               value="${val}" placeholder="${i+1}"
                               onchange="recordSet('${exerciseKey}', ${i}, this.value)">
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function recordSet(exKey, setIdx, val) {
        state.currentSession[activeT][exKey][setIdx] = val;
        localStorage.setItem('workoutV30', JSON.stringify(state));
        renderToday();
    }

    async function finishWorkout() {
        const details = [];
        state.routines[activeT].forEach((ex, idx) => {
            const exerciseKey = `${activeT}_${idx}`;
            const sets = (state.currentSession[activeT][exerciseKey] || []).filter(v => v !== "");
            if (sets.length > 0) {
                details.push({ name: ex.n, setsDone: sets.length, reps: sets.join("-") });
            }
        });

        const payload = {
            date: new Date().toLocaleString('pt-BR'),
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            type: "TREINO ("+activeT+")",
            details: details
        };

        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Enviado com Biometria!");
        state.currentSession[activeT] = {};
        localStorage.setItem('workoutV30', JSON.stringify(state));
        location.reload();
    }

    function renderEdit() { /* Logic to edit routines */ }
</script>
</body>
</html>
