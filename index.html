<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout OS v27</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; touch-action: manipulation; }
        .nav { display: flex; justify-content: space-around; background: var(--card); padding: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        .nav button { background: none; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 140px; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; }
        
        .selector-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .selector-scroll::-webkit-scrollbar { display: none; }
        .sel-btn { flex: 0 0 auto; padding: 12px 20px; border-radius: 20px; border: 2px solid var(--primary); background: #1e293b; color: white; cursor: pointer; font-weight: bold; font-size: 0.75rem; white-space: nowrap; }
        .sel-btn.active { background: var(--primary); }

        /* Estilo das Bolinhas de Input Individual */
        .set-input { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #475569; background: #0f172a; color: white; text-align: center; font-weight: bold; font-size: 1rem; margin: 4px; outline: none; transition: 0.3s; }
        .set-input:focus { border-color: var(--primary); background: #1e293b; }
        .set-input.has-value { border-color: var(--accent); background: #064e3b; }

        .edit-input { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; margin: 5px 0; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        
        #timer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 4px solid var(--primary); padding: 15px; display: none; z-index: 2000; text-align: center; }
        .cardio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .cardio-grid button { padding: 10px; border-radius: 8px; border: 1px solid var(--primary); background: none; color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .cardio-grid button.active { background: var(--primary); }
    </style>
</head>
<body>

<div id="timer-bar">
    <div id="timer-display" style="font-size: 2.2rem; font-weight: bold; color: var(--primary);">00:00</div>
    <button onclick="stopTimer()" style="background:#ef4444; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:bold;">PULAR</button>
</div>

<div class="nav">
    <button onclick="showView('today')" id="nav-today" class="active">TREINAR</button>
    <button onclick="showView('cardio')" id="nav-cardio">CARDIO</button>
    <button onclick="showView('history')" id="nav-history">HISTÓRICO</button>
    <button onclick="showView('edit')" id="nav-edit">CONFIGS</button>
</div>

<div class="container">
    <div id="view-today" class="view active">
        <div id="workout-selector" class="selector-scroll"></div>
        <div id="todayList"></div>
        <button id="finish-btn" class="btn-action" style="display:none" onclick="finishWorkout()">FINALIZAR SESSÃO</button>
    </div>

    <div id="view-cardio" class="view">
        <div class="card">
            <h3>ATIVIDADE AERÓBICA</h3>
            <div class="cardio-grid">
                <button id="btn-RUN" class="active" onclick="setCardio('RUN')">RUN</button>
                <button id="btn-BIKE" onclick="setCardio('BIKE')">BIKE</button>
                <button id="btn-ROPE" onclick="setCardio('ROPE')">ROPE</button>
                <button id="btn-SWIM" onclick="setCardio('SWIM')">SWIM</button>
                <button id="btn-WALK" onclick="setCardio('WALK')">WALK</button>
            </div>
            <input type="number" id="c-dist" class="edit-input" placeholder="KM (opcional)">
            <input type="text" id="c-time" class="edit-input" placeholder="Tempo (ex: 40min)">
            <button class="btn-action" onclick="finishCardio()">REGISTRAR</button>
        </div>
    </div>

    <div id="view-history" class="view"><div id="historyList"></div></div>
    
    <div id="view-edit" class="view">
        <button class="btn-action" style="background:var(--primary); margin-bottom:20px;" onclick="addNewCategory()">+ NOVO TREINO</button>
        <div id="edit-lists"></div>
        <button class="btn-action" style="background:var(--accent)" onclick="saveAll()">SALVAR CONFIGS</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxIgz83h_70zfBScoNUmx8C8sGdeuRLbZVYFedoqzSDK2tPtqFzEgIkcrQuqfWC-Arn/exec"; 
    let cardioType = 'RUN';
    let activeT = null;
    let timerInt;

    let state = JSON.parse(localStorage.getItem('workoutV27')) || { 
        routines: { "Exemplo": [{n:"Flexão", s:3, r:"12", d:60}] }, 
        history: [],
        currentSession: {} // Salva o que você digita nas bolinhas
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
        if(v === 'edit') renderEdit();
        if(v === 'history') renderHistory();
        if(v === 'today') renderSelector();
    }

    function renderSelector() {
        const grid = document.getElementById('workout-selector');
        grid.innerHTML = Object.keys(state.routines).map(key => 
            `<button class="sel-btn ${activeT === key ? 'active' : ''}" onclick="selectWorkout('${key}')">${key.toUpperCase()}</button>`
        ).join('');
    }

    function selectWorkout(key) {
        activeT = key;
        if (!state.currentSession[activeT]) state.currentSession[activeT] = {};
        renderSelector();
        renderToday();
        document.getElementById('finish-btn').style.display = 'block';
    }

    function renderToday() {
        if(!activeT) return;
        const container = document.getElementById('todayList');
        container.innerHTML = state.routines[activeT].map((ex, idx) => {
            const exerciseKey = `${activeT}_${idx}`;
            if (!state.currentSession[activeT][exerciseKey]) {
                state.currentSession[activeT][exerciseKey] = Array(parseInt(ex.s)).fill("");
            }

            return `<div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong>${ex.n}</strong>
                    <span style="font-size:0.7rem; color:#94a3b8">Meta: ${ex.r} reps</span>
                </div>
                <div style="display:flex; flex-wrap:wrap;">
                    ${state.currentSession[activeT][exerciseKey].map((val, i) => `
                        <input type="number" 
                               inputmode="numeric"
                               class="set-input ${val !== "" ? 'has-value' : ''}" 
                               value="${val}" 
                               placeholder="${i+1}"
                               onfocus="this.placeholder=''"
                               onblur="this.placeholder='${i+1}'"
                               onchange="recordSet('${exerciseKey}', ${i}, this.value, ${ex.d})">
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function recordSet(exKey, setIdx, val, rest) {
        state.currentSession[activeT][exKey][setIdx] = val;
        localStorage.setItem('workoutV27', JSON.stringify(state));
        if (val !== "") startTimer(rest);
        renderToday();
    }

    function startTimer(s) {
        clearInterval(timerInt);
        document.getElementById('timer-bar').style.display = 'block';
        timerInt = setInterval(() => {
            s--;
            let min = Math.floor(s/60), sec = s%60;
            document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if (s <= 0) stopTimer();
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInt); document.getElementById('timer-bar').style.display = 'none'; }

    async function finishWorkout() {
        const details = [];
        const currentData = state.currentSession[activeT];
        
        state.routines[activeT].forEach((ex, idx) => {
            const exerciseKey = `${activeT}_${idx}`;
            const setsArray = currentData[exerciseKey] || [];
            // Filtra apenas as séries que foram preenchidas
            const validSets = setsArray.filter(v => v !== "" && v !== null);
            
            if (validSets.length > 0) {
                details.push({
                    name: ex.n,
                    setsDone: validSets.length,
                    reps: validSets.join("-") // Envia como "10-8-7" para a planilha
                });
            }
        });

        if (details.length === 0) return alert("Preencha pelo menos uma série!");
        
        await send({ date: new Date().toLocaleString('pt-BR'), type: "TREINO ("+activeT+")", details: details });
        state.currentSession[activeT] = {}; // Limpa após enviar
        localStorage.setItem('workoutV27', JSON.stringify(state));
    }

    function setCardio(t) {
        cardioType = t;
        document.querySelectorAll('.cardio-grid button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
    }

    async function finishCardio() {
        const d = document.getElementById('c-dist').value;
        const t = document.getElementById('c-time').value;
        if(cardioType === 'RUN' && !d) return alert("Insira KM!");
        if(!t) return alert("Insira tempo!");
        await send({ date: new Date().toLocaleString('pt-BR'), type: cardioType, dist: d ? d + " KM" : "Indoor", time: t });
    }

    async function send(p) {
        state.history.unshift({date: p.date, type: p.type, data: p.dist || "Sessão"});
        localStorage.setItem('workoutV27', JSON.stringify(state));
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Dados enviados!"); location.reload();
    }

    function addNewCategory() {
        const name = prompt("Nome do treino:");
        if(name) { state.routines[name] = [{n:"Novo", s:3, r:"10", d:60}]; renderEdit(); }
    }

    function renderEdit() {
        let h = '';
        for (let t in state.routines) {
            h += `<div class="card"><h3>${t}</h3>`;
            state.routines[t].forEach((ex, i) => {
                h += `<div style="margin-bottom:10px; border-bottom:1px solid #334155;">
                    <input type="text" value="${ex.n}" onchange="state.routines['${t}'][${i}].n=this.value" class="edit-input">
                    <div style="display:flex; gap:5px;">
                        <input type="number" value="${ex.s}" onchange="state.routines['${t}'][${i}].s=this.value" class="edit-input" placeholder="Sets">
                        <input type="text" value="${ex.r}" onchange="state.routines['${t}'][${i}].r=this.value" class="edit-input" placeholder="Reps">
                        <input type="number" value="${ex.d}" onchange="state.routines['${t}'][${i}].d=this.value" class="edit-input" placeholder="Rest">
                    </div>
                </div>`;
            });
            h += `</div>`;
        }
        document.getElementById('edit-lists').innerHTML = h;
    }

    function saveAll() { localStorage.setItem('workoutV27', JSON.stringify(state)); alert("Salvo!"); showView('today'); }
    function renderHistory() {
        document.getElementById('historyList').innerHTML = state.history.slice(0,10).map(h => `<div class="card"><small>${h.date}</small><br><strong>${h.type}</strong>: ${h.data}</div>`).join('');
    }
    renderSelector();
</script>
</body>
</html>
